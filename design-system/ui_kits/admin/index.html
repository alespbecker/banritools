<!-- @dsCard group="Painel Admin" viewport="1280x800" name="Painel Admin (web)" subtitle="Dashboard da agência, catálogo de produtos e editor — light, interativo." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banritools — Painel Admin</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-body); background: var(--bg); }
  .admin { display: flex; height: 100vh; overflow: hidden; }

  .admin-side {
    width: 248px; flex: none; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 18px 14px;
  }
  .admin-side__brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-brand); font-weight: 600; font-size: 20px; letter-spacing: -0.01em; color: var(--text); padding: 6px 8px 20px; }
  .admin-side__nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .admin-navitem {
    display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: var(--radius-md);
    border: none; background: none; cursor: pointer; font-family: var(--font-body); font-size: 15px;
    font-weight: 600; color: var(--text-muted); text-align: left;
    transition: background-color var(--duration-fast) var(--ease-standard), color var(--duration-fast) var(--ease-standard);
  }
  .admin-navitem:hover { background: var(--surface-2); color: var(--text); }
  .admin-navitem--active { background: var(--primary-soft); color: var(--on-soft); }
  .admin-navitem--active svg { color: var(--primary); }
  .admin-side__foot { border-top: 1px solid var(--border); padding-top: 14px; }
  .admin-agency { display: flex; align-items: center; gap: 10px; padding: 6px 8px; }

  .admin-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .admin-top { height: 64px; flex: none; display: flex; align-items: center; gap: 8px; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .admin-search { display: flex; align-items: center; gap: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0 14px; height: 40px; width: 380px; color: var(--text-subtle); }
  .admin-search input { border: none; background: none; outline: none; font-family: var(--font-body); font-size: 15px; color: var(--text); width: 100%; }
  .admin-content { flex: 1; overflow-y: auto; padding: 32px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* Banritools — Painel Admin (web). Screens. Light mode. */
const NS = window.BanritoolsDesignSystem_38adfd;
const {
  Icon, Card, Badge, Button, IconButton, StatCard, RankRow, ListRow, Avatar,
  ProgressBar, CurrencyBRL, Input, Select, Tabs, SegmentedControl, Banner, Checkbox,
} = NS;

function PageHead({ eyebrow, title, subtitle, actions }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16, flexWrap: "wrap", marginBottom: 22 }}>
      <div>
        {eyebrow && <div style={{ marginBottom: 8 }}><Badge variant="purple" size="md"><Icon name="users" size={14} /> {eyebrow}</Badge> <span style={{ color: "var(--text-muted)", fontSize: 14, marginLeft: 6 }}>Junho de 2026</span></div>}
        <h1 style={{ fontSize: 34 }}>{title}</h1>
        <p style={{ color: "var(--text-muted)", marginTop: 6, fontSize: 17, maxWidth: 560 }}>{subtitle}</p>
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>{actions}</div>
    </div>
  );
}

/* ---------- Painel da Agência ---------- */
function PainelScreen() {
  return (
    <div>
      <PageHead eyebrow="Time" title="Painel da Agência" subtitle="Visão consolidada do time, ranking e gestão de usuários."
        actions={<>
          <Select defaultValue="atual" aria-label="Período"><option value="atual">Mês Atual</option><option>Maio</option></Select>
          <Button variant="secondary" iconLeft={<Icon name="download" size={16} />}>Exportar Relatórios</Button>
          <Button variant="primary" iconLeft={<Icon name="plus" size={16} />}>Novo produto</Button>
        </>} />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 22 }}>
        <StatCard label="Engajamento" value="78%" sub="14 de 18 ativos" icon={<Icon name="activity" size={20} />} trend={<Badge variant="success">+9%</Badge>} />
        <StatCard label="Média por ativo" value="42" sub="Unidades / colaborador" iconColor="success" icon={<Icon name="gauge" size={20} />} />
        <StatCard label="Top performer" value="Becker" sub="9.150 pts no mês" iconColor="purple" icon={<Icon name="trophy" size={20} />} />
        <StatCard label="Gap do ranking" value="2.970" sub="Pontos entre 1º e último" iconColor="turquoise" icon={<Icon name="target" size={20} />} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 16, alignItems: "start" }}>
        <Card padding="none">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 20px 12px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span className="bt-icontile bt-icontile--purple"><Icon name="trophy" size={18} /></span>
              <div>
                <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 19, color: "var(--text)" }}>Top 10 — Pontuação do mês</div>
                <div style={{ fontSize: 13, color: "var(--text-muted)" }}>Atualizado há 4 min</div>
              </div>
            </div>
            <SegmentedControl value="mes" onChange={() => {}} items={[{ value: "mes", label: "Mês" }, { value: "tri", label: "Trimestre" }]} />
          </div>
          <RankRow position={1} name="Alessandro Becker" points="9.150 pts" avatar={<Avatar name="Alessandro Becker" />} tags={<Badge variant="warning">Líder</Badge>} progress={<ProgressBar value={100} variant="warning" label="x" />} />
          <RankRow position={2} name="Marina Petry" points="8.830 pts" avatar={<Avatar name="Marina Petry" color="purple" />} progress={<ProgressBar value={96} label="x" />} />
          <RankRow position={3} name="Rafael Souza" points="7.420 pts" avatar={<Avatar name="Rafael Souza" color="turquoise" />} progress={<ProgressBar value={81} label="x" />} />
          <RankRow position={4} name="Juliana Lima" points="6.180 pts" avatar={<Avatar name="Juliana Lima" color="navy" />} progress={<ProgressBar value={67} label="x" />} />
          <RankRow position={5} name="Diego Fontes" points="5.940 pts" avatar={<Avatar name="Diego Fontes" />} progress={<ProgressBar value={65} label="x" />} />
        </Card>

        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Card>
            <span className="eyebrow">Total da agência</span>
            <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 44, color: "var(--text)", lineHeight: 1, marginTop: 8, fontVariantNumeric: "tabular-nums" }}>142.380</div>
            <div style={{ color: "var(--text-muted)", fontSize: 14, marginTop: 4 }}>pontos · 18 participantes</div>
            <div style={{ marginTop: 16 }}><ProgressBar value={71} variant="gradient" label="meta" /></div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 13, color: "var(--text-muted)" }}>
              <span>71% da meta mensal</span><span className="tabular">200.000</span>
            </div>
          </Card>
          <Card>
            <span className="eyebrow">Comissão prevista</span>
            <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "var(--text-muted)", fontSize: 14 }}>Seguros</span><CurrencyBRL value={18250} positive /></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "var(--text-muted)", fontSize: 14 }}>Capitalização</span><CurrencyBRL value={9480} positive /></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "var(--text-muted)", fontSize: 14 }}>Crédito</span><CurrencyBRL value={12300} positive /></div>
              <div style={{ display: "flex", justifyContent: "space-between", borderTop: "1px solid var(--border)", paddingTop: 10 }}><span style={{ fontWeight: 600 }}>Total</span><CurrencyBRL value={40030} positive /></div>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

/* ---------- Produtos ---------- */
const PRODUTOS = [
  { name: "Seguro Vida", cat: "Seguros", pts: 50, metric: "Quantidade + Valor", icon: "shield", color: "purple", on: true },
  { name: "Capitalização", cat: "Capitalização", pts: 20, metric: "Quantidade + Valor", icon: "piggy-bank", color: "brand", on: true },
  { name: "Cheque Especial", cat: "Crédito", pts: 25, metric: "Quantidade", icon: "credit-card", color: "turquoise", on: true },
  { name: "Crédito Minuto", cat: "Crédito", pts: 40, metric: "Volume R$", icon: "banknote", color: "turquoise", on: false },
  { name: "Consórcio", cat: "Consórcio", pts: 60, metric: "Quantidade + Valor", icon: "car", color: "purple", on: true },
];

function ProdutosScreen({ onEdit }) {
  return (
    <div>
      <PageHead title="Produtos" subtitle="Gerencie o catálogo de produtos, pontuação e esquema de campos."
        actions={<><Button variant="secondary" iconLeft={<Icon name="search" size={16} />}>Buscar</Button><Button variant="primary" iconLeft={<Icon name="plus" size={16} />}>Novo produto</Button></>} />
      <Card padding="none">
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1.2fr 0.6fr", gap: 12, padding: "12px 20px", borderBottom: "1px solid var(--border)" }}>
          {["Produto", "Categoria", "Pts/unidade", "Métrica", "Ativo"].map((h) => <span key={h} className="eyebrow">{h}</span>)}
        </div>
        {PRODUTOS.map((p) => (
          <div key={p.name} className="bt-listrow bt-listrow--button" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1.2fr 0.6fr", gap: 12, alignItems: "center" }} onClick={() => onEdit(p)}>
            <span style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span className={`bt-icontile ${p.color !== "brand" ? "bt-icontile--" + p.color : ""}`}><Icon name={p.icon} size={18} /></span>
              <span style={{ fontWeight: 600, color: "var(--text)" }}>{p.name}</span>
            </span>
            <span style={{ color: "var(--text-muted)" }}>{p.cat}</span>
            <span className="tabular" style={{ fontWeight: 600 }}>{p.pts}</span>
            <span style={{ color: "var(--text-muted)", fontSize: 14 }}>{p.metric}</span>
            <span>{p.on ? <Badge variant="success" dot>Ativo</Badge> : <Badge variant="neutral">Inativo</Badge>}</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

/* ---------- Editar Produto ---------- */
function ProdutoEditScreen({ produto, onBack }) {
  const [tab, setTab] = React.useState("info");
  const p = produto || PRODUTOS[1];
  return (
    <div style={{ maxWidth: 760 }}>
      <button onClick={onBack} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "var(--link)", fontWeight: 600, fontSize: 14, cursor: "pointer", padding: 0, marginBottom: 16 }}>
        <Icon name="arrow-left" size={16} /> Voltar para Produtos
      </button>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 6 }}>
        <span className={`bt-icontile bt-icontile--lg ${p.color !== "brand" ? "bt-icontile--" + p.color : ""}`}><Icon name={p.icon} size={22} /></span>
        <div>
          <h1 style={{ fontSize: 30 }}>{p.name}</h1>
          <p style={{ color: "var(--text-subtle)", fontSize: 14, fontFamily: "var(--font-mono)" }}>{p.cat.toLowerCase()} · legacy: {p.name.toLowerCase().replace(/\s/g, "_")}</p>
        </div>
      </div>
      <div style={{ margin: "18px 0 22px" }}>
        <Tabs value={tab} onChange={setTab} items={[
          { value: "info", label: "Informações" },
          { value: "var", label: "Variantes (5)" },
          { value: "campos", label: "Esquema de campos" },
        ]} />
      </div>

      {tab === "info" && (
        <Card padding="lg">
          <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            <Input label="Nome" defaultValue={p.name} />
            <Input label="Descrição" defaultValue={`Títulos de ${p.cat.toLowerCase()}`} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <Input label="Categoria" defaultValue={p.cat} />
              <Input label="Subcategoria" optional placeholder="—" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
              <Input label="Unidade" defaultValue="unidade" />
              <Input label="Pts/unidade" defaultValue={String(p.pts)} icon={<Icon name="star" size={16} />} />
              <Input label="Ordem" defaultValue="30" />
            </div>
            <Select label="Tipo de métrica" defaultValue={p.metric}><option>{p.metric}</option><option>Quantidade</option><option>Volume R$</option></Select>
            <div style={{ background: "var(--success-soft)", border: "1px solid var(--success-border)", borderRadius: "var(--radius-md)", padding: 16 }}>
              <div style={{ color: "var(--success)", fontWeight: 600, marginBottom: 12 }}>Comissão prevista do vendedor</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <Input label="R$ por unidade" defaultValue="10" helper="Valor fixo por unidade" />
                <Input label="% sobre o valor" defaultValue="0" helper="Percentual aplicado ao valor" />
              </div>
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 22 }}>
            <Button variant="ghost" onClick={onBack}>Cancelar</Button>
            <Button variant="primary" iconLeft={<Icon name="save" size={16} />}>Salvar alterações</Button>
          </div>
        </Card>
      )}
      {tab === "var" && (
        <Card padding="none">
          {["Plano Mensal", "Plano Anual", "Plano Premium", "Plano Família", "Plano Empresa"].map((v, i) => (
            <ListRow key={v} leading={<span className="bt-icontile"><Icon name="layers" size={18} /></span>}
              title={v} subtitle={`${20 + i * 10} pts · ativo`} trailing={<Icon name="chevron-right" size={18} />} onClick={() => {}} />
          ))}
        </Card>
      )}
      {tab === "campos" && (
        <Card padding="lg">
          <Banner tone="info" icon={<Icon name="info" size={18} />} title="Esquema de campos">Defina quais campos o consultor preenche ao lançar este produto.</Banner>
          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 12 }}>
            {[["Quantidade", true], ["Valor (R$)", true], ["Subtipo", false], ["Observação", false]].map(([f, req]) => (
              <div key={f} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid var(--border)" }}>
                <span style={{ fontWeight: 600, color: "var(--text)" }}>{f}</span>
                <Checkbox label="Obrigatório" defaultChecked={req} />
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

Object.assign(window, { PainelScreen, ProdutosScreen, ProdutoEditScreen });

</script>
<script type="text/babel">
/* Banritools — Painel Admin shell: sidebar + topbar + content routing. Light. */
const NS = window.BanritoolsDesignSystem_38adfd;
const { Icon, IconButton, Avatar, Badge } = NS;

const SIDE = [
  { value: "painel", label: "Painel", icon: "layout-dashboard" },
  { value: "produtos", label: "Produtos", icon: "package" },
  { value: "usuarios", label: "Usuários", icon: "users" },
  { value: "metas", label: "Metas", icon: "target" },
  { value: "relatorios", label: "Relatórios", icon: "file-bar-chart" },
];

function Sidebar({ active, onNav }) {
  return (
    <aside className="admin-side">
      <div className="admin-side__brand">
        <img src="../../assets/logo-mark.svg" width="28" height="28" alt="" />
        <span>banritools</span>
      </div>
      <nav className="admin-side__nav">
        {SIDE.map((it) => (
          <button key={it.value} className={`admin-navitem ${active === it.value || (active === "produto-edit" && it.value === "produtos") ? "admin-navitem--active" : ""}`} onClick={() => onNav(it.value)}>
            <Icon name={it.icon} size={20} />
            <span>{it.label}</span>
          </button>
        ))}
      </nav>
      <div className="admin-side__foot">
        <div className="admin-agency">
          <span className="bt-icontile" style={{ width: 36, height: 36 }}><Icon name="building-2" size={18} /></span>
          <div>
            <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>Agência 0427</div>
            <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Porto Alegre — RS</div>
          </div>
        </div>
      </div>
    </aside>
  );
}

function Topbar() {
  return (
    <header className="admin-top">
      <div className="admin-search">
        <Icon name="search" size={18} />
        <input placeholder="Buscar produtos, pessoas, lançamentos…" />
      </div>
      <div style={{ flex: 1 }} />
      <IconButton aria-label="Atualizar"><Icon name="refresh-cw" /></IconButton>
      <IconButton aria-label="Notificações" className="bt-appbar__dot"><Icon name="bell" /></IconButton>
      <div style={{ display: "flex", alignItems: "center", gap: 10, paddingLeft: 8, borderLeft: "1px solid var(--border)", marginLeft: 4 }}>
        <Avatar name="Ana Gestora" size="sm" color="navy" />
        <div style={{ lineHeight: 1.2 }}>
          <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>Ana Gestora</div>
          <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Administradora</div>
        </div>
      </div>
    </header>
  );
}

function AdminApp() {
  const [route, setRoute] = React.useState("painel");
  const [editing, setEditing] = React.useState(null);
  const scrollRef = React.useRef(null);
  React.useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [route]);

  function nav(r) { setRoute(r); }
  function edit(p) { setEditing(p); setRoute("produto-edit"); }

  let content = null;
  if (route === "painel") content = <PainelScreen />;
  else if (route === "produtos") content = <ProdutosScreen onEdit={edit} />;
  else if (route === "produto-edit") content = <ProdutoEditScreen produto={editing} onBack={() => setRoute("produtos")} />;
  else content = (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "60vh", color: "var(--text-subtle)", gap: 12 }}>
      <span className="bt-icontile bt-icontile--lg"><Icon name="construction" size={24} /></span>
      <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 20, color: "var(--text-muted)" }}>Em construção</div>
      <p>Esta seção faz parte do roadmap do painel.</p>
    </div>
  );

  return (
    <div className="admin">
      <Sidebar active={route} onNav={nav} />
      <div className="admin-main">
        <Topbar />
        <div ref={scrollRef} className="admin-content">{content}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp />);

</script>
</body>
</html>
