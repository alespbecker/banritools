<!-- @dsCard group="Brand" viewport="700x190" name="Brand meaning & voice" subtitle="What the three hex nuts stand for, and how we write." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); font-family: var(--font-body); color: var(--text); display: grid; grid-template-columns: 200px 1fr; gap: 28px; align-items: center; }
  .hexes { display: flex; gap: 16px; }
  .hx { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .hx span { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .dot { width: 30px; height: 30px; }
  .voice li { font-size: 13.5px; margin-bottom: 7px; color: var(--text); line-height: 1.45; }
  .voice b { color: var(--link); }
  ul { margin: 0; padding-left: 18px; }
</style>
</head>
<body>
  <div class="hexes">
    <div class="hx"><svg class="dot" viewBox="0 0 32 32"><path fill="var(--primary-500)" fill-rule="evenodd" d="M16 2 L29 9.5 L29 22.5 L16 30 L3 22.5 L3 9.5 Z M22 16 A6 6 0 1 0 10 16 A6 6 0 1 0 22 16 Z"></path></svg><span>humano</span></div>
    <div class="hx"><svg class="dot" viewBox="0 0 32 32"><path fill="var(--turquoise-500)" fill-rule="evenodd" d="M16 2 L29 9.5 L29 22.5 L16 30 L3 22.5 L3 9.5 Z M22 16 A6 6 0 1 0 10 16 A6 6 0 1 0 22 16 Z"></path></svg><span>coletivo</span></div>
    <div class="hx"><svg class="dot" viewBox="0 0 32 32"><path fill="var(--purple-500)" fill-rule="evenodd" d="M16 2 L29 9.5 L29 22.5 L16 30 L3 22.5 L3 9.5 Z M22 16 A6 6 0 1 0 10 16 A6 6 0 1 0 22 16 Z"></path></svg><span>presente</span></div>
  </div>
  <ul class="voice">
    <li>Tom <b>direto, encorajador, operacional</b> — "Lance suas vendas do dia em segundos."</li>
    <li>Falamos com <b>você</b>, em pt-BR. Sentença curta, verbo no comando: "Salvar lançamento", "Ver metas".</li>
    <li>Rótulos de seção em <b>CAIXA ALTA discreta</b>; números dominam, rótulos recuam. Sem emoji.</li>
  </ul>
</body>
</html>
