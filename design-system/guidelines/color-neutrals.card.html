<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals — Gray" subtitle="Cool grays pulled slightly toward navy. Text, surfaces, borders." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); font-family: var(--font-body); }
  .row { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .sw { flex: 1; height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px 8px; font-size: 11px; font-weight: 600; }
  .sw small { font-weight: 400; opacity: .75; font-size: 10px; }
  .note { margin-top: 12px; font-size: 12.5px; color: var(--text-muted); }
  .note b { color: var(--text); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--gray-0);color:#121620;box-shadow:inset 0 0 0 1px var(--border)">0<small>FFFFFF</small></div>
    <div class="sw" style="background:var(--gray-50);color:#121620">50</div>
    <div class="sw" style="background:var(--gray-100);color:#121620">100</div>
    <div class="sw" style="background:var(--gray-200);color:#121620">200</div>
    <div class="sw" style="background:var(--gray-300);color:#121620">300</div>
    <div class="sw" style="background:var(--gray-400);color:#121620">400</div>
    <div class="sw" style="background:var(--gray-500);color:#fff">500</div>
    <div class="sw" style="background:var(--gray-600);color:#fff">600</div>
    <div class="sw" style="background:var(--gray-700);color:#fff">700</div>
    <div class="sw" style="background:var(--gray-800);color:#fff">800</div>
    <div class="sw" style="background:var(--gray-900);color:#fff">900</div>
    <div class="sw" style="background:var(--gray-950);color:#fff">950<small>0A0D14</small></div>
  </div>
  <div class="note"><b>900</b> body text · <b>600</b> muted text · <b>200</b> borders · <b>400</b> only on disabled (contrast-exempt)</div>
</body>
</html>
