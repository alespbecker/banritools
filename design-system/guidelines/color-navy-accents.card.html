<!-- @dsCard group="Colors" viewport="700x210" name="Navy, Turquoise & Purple" subtitle="Deep brand navy + the two accent / data-viz hues." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); font-family: var(--font-body); }
  .grp { margin-bottom: 14px; }
  .grp:last-child { margin-bottom: 0; }
  .lbl { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: flex; gap: 8px; align-items: baseline; }
  .lbl span { font-weight: 400; color: var(--text-muted); font-size: 11px; }
  .row { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 44px; display: flex; align-items: flex-end; padding: 5px 7px; font-size: 10px; font-weight: 600; color: #fff; }
</style>
</head>
<body>
  <div class="grp">
    <div class="lbl">Navy <span>#000050 — heros, brand headers, dark buttons</span></div>
    <div class="row">
      <div class="sw" style="background:var(--navy-600)">600</div>
      <div class="sw" style="background:var(--navy-700)">700</div>
      <div class="sw" style="background:var(--navy-800)">800</div>
      <div class="sw" style="background:var(--navy-900)">900</div>
    </div>
  </div>
  <div class="grp">
    <div class="lbl">Turquoise <span>#1CD8CA — accent · data-viz · 700 is text-safe</span></div>
    <div class="row">
      <div class="sw" style="background:var(--turquoise-400);color:#085E58">400</div>
      <div class="sw" style="background:var(--turquoise-500);color:#085E58">500</div>
      <div class="sw" style="background:var(--turquoise-600)">600</div>
      <div class="sw" style="background:var(--turquoise-700)">700</div>
      <div class="sw" style="background:var(--turquoise-800)">800</div>
    </div>
  </div>
  <div class="grp">
    <div class="lbl">Purple <span>#936FFA — accent · data-viz · 700 is text-safe</span></div>
    <div class="row">
      <div class="sw" style="background:var(--purple-400);color:#421F94">400</div>
      <div class="sw" style="background:var(--purple-500)">500</div>
      <div class="sw" style="background:var(--purple-600)">600</div>
      <div class="sw" style="background:var(--purple-700)">700</div>
      <div class="sw" style="background:var(--purple-800)">800</div>
    </div>
  </div>
</body>
</html>
