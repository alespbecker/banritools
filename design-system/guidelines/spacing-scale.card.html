<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base, 8pt rhythm. Card padding 20–24, gap between cards 16." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); font-family: var(--font-body); color: var(--text); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--primary-soft); border: 1px solid var(--primary-soft-border); border-radius: var(--radius-sm); }
  .tok { font-size: 11px; color: var(--text-muted); margin-top: 7px; font-weight: 600; }
  .px { font-size: 10px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="tok">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="tok">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="tok">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="tok">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="width:20px;height:20px"></div><div class="tok">5</div><div class="px">20</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="tok">6</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="tok">8</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="width:40px;height:40px"></div><div class="tok">10</div><div class="px">40</div></div>
    <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="tok">12</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="tok">16</div><div class="px">64</div></div>
  </div>
</body>
</html>
