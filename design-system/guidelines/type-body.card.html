<!-- @dsCard group="Type" viewport="700x230" name="Body — Source Sans 3" subtitle="Running text & UI labels. Weights 400/500/600." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); font-family: var(--font-body); color: var(--text); }
  p { margin: 0 0 10px; }
  .xl { font-size: 20px; font-weight: 600; }
  .lg { font-size: 18px; font-weight: 500; }
  .base { font-size: 16px; font-weight: 400; color: var(--text); max-width: 60ch; line-height: 1.6; }
  .muted { color: var(--text-muted); font-size: 14px; }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <p class="xl">Sua central de operações <span class="meta">xl · 20 / 600</span></p>
  <p class="lg">Lance suas vendas do dia em segundos <span class="meta">lg · 18 / 500</span></p>
  <p class="base">Cada lançamento de produção soma pontos para sua posição no mês. Acompanhe sua evolução versus o líder e mantenha o ritmo. <span class="meta">base · 16 / 400</span></p>
  <p class="muted">0 de 1 ativos · Pontos entre 1º e último <span class="meta">sm · 14 / 400 · muted</span></p>
</body>
</html>
