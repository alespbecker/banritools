<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); font-family: var(--font-display); color: var(--text); }
  .d { letter-spacing: var(--tracking-display); line-height: 1.05; margin: 0; }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); font-weight: 400; letter-spacing: 0; margin-left: 10px; }
  .stack > * { margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="stack">
    <p class="d" style="font-size:48px;font-weight:700">Painel da Agência<span class="meta">display · 48 / 700</span></p>
    <p class="d" style="font-size:36px;font-weight:700">Registrar Produção<span class="meta">h1 · 36 / 700</span></p>
    <p class="d" style="font-size:30px;font-weight:600">Ranking de junho<span class="meta">h2 · 30 / 600</span></p>
    <p class="d" style="font-size:24px;font-weight:600">Próxima melhor ação<span class="meta">h3 · 24 / 600</span></p>
  </div>
</body>
</html>
