<!-- @dsCard group="Colors" viewport="700x190" name="Primary — Azul Banrisul" subtitle="Brand blue scale. 500 = recognition color; 600/700 are text-safe." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); font-family: var(--font-body); }
  .row { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px 8px; font-size: 11px; font-weight: 600; line-height: 1.3; }
  .sw small { font-weight: 400; opacity: .8; font-size: 10px; }
  .note { display: flex; gap: 16px; margin-top: 12px; font-size: 12.5px; color: var(--text-muted); }
  .note b { color: var(--text); }
  .chip { width: 10px; height: 10px; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 5px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--primary-50);color:#00477D">50<small>E8F4FF</small></div>
    <div class="sw" style="background:var(--primary-100);color:#00477D">100</div>
    <div class="sw" style="background:var(--primary-200);color:#00477D">200</div>
    <div class="sw" style="background:var(--primary-300);color:#002E52">300</div>
    <div class="sw" style="background:var(--primary-400);color:#fff">400</div>
    <div class="sw" style="background:var(--primary-500);color:#fff">500<small>0094FF</small></div>
    <div class="sw" style="background:var(--primary-600);color:#fff">600<small>0077DB</small></div>
    <div class="sw" style="background:var(--primary-700);color:#fff">700<small>0061B0</small></div>
    <div class="sw" style="background:var(--primary-800);color:#fff">800</div>
    <div class="sw" style="background:var(--primary-900);color:#fff">900</div>
    <div class="sw" style="background:var(--primary-950);color:#fff">950</div>
  </div>
  <div class="note">
    <span><span class="chip" style="background:var(--primary-500)"></span><b>500</b> accent · icon · focus · big titles</span>
    <span><span class="chip" style="background:var(--primary-600)"></span><b>600</b> solid button</span>
    <span><span class="chip" style="background:var(--primary-700)"></span><b>700</b> text · links</span>
  </div>
</body>
</html>
