<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-body); color: var(--text); display: flex; gap: 36px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .lock { display: flex; align-items: center; gap: 12px; }
  .word { font-family: var(--font-brand); font-weight: 600; font-size: 26px; letter-spacing: -0.01em; color: var(--text); }
  .tok { font-size: 11.5px; color: var(--text-muted); }
  img { display: block; }
</style>
</head>
<body>
  <div class="item">
    <div class="lock"><img src="../assets/logo-mark.svg" width="44" height="44" alt=""><span class="word">banritools</span></div>
    <span class="tok">Horizontal lockup</span>
  </div>
  <div class="item">
    <img src="../assets/logo-mark.svg" width="64" height="64" alt="Banritools">
    <span class="tok">Color mark</span>
  </div>
  <div class="item">
    <img src="../assets/logo-mark-mono.svg" width="64" height="64" alt="Banritools mono" style="color:var(--navy-800)">
    <span class="tok">Monochrome</span>
  </div>
  <div class="item">
    <img src="../assets/app-icon.svg" width="64" height="64" alt="Banritools app icon">
    <span class="tok">App icon</span>
  </div>
</body>
</html>
