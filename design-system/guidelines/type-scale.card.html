<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="9 steps, base 16px. Exo 2 for display, Source Sans 3 below." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface); font-family: var(--font-body); color: var(--text); }
  .r { display: grid; grid-template-columns: 70px 1fr 140px; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .r:last-child { border-bottom: none; }
  .tok { font-size: 12px; color: var(--text-muted); font-weight: 600; }
  .meta { font-size: 11px; color: var(--text-subtle); text-align: right; }
  .s { line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .disp { font-family: var(--font-display); }
</style>
</head>
<body>
  <div class="r"><span class="tok">display</span><span class="s disp" style="font-size:32px;font-weight:700;letter-spacing:.01em">Banritools</span><span class="meta">48 · Exo 2 700</span></div>
  <div class="r"><span class="tok">h1</span><span class="s disp" style="font-size:27px;font-weight:700">Banritools</span><span class="meta">36 · Exo 2 700</span></div>
  <div class="r"><span class="tok">h2</span><span class="s disp" style="font-size:23px;font-weight:600">Banritools</span><span class="meta">30 · Exo 2 600</span></div>
  <div class="r"><span class="tok">h3</span><span class="s disp" style="font-size:20px;font-weight:600">Banritools</span><span class="meta">24 · Exo 2 600</span></div>
  <div class="r"><span class="tok">xl</span><span class="s" style="font-size:18px;font-weight:600">Banritools</span><span class="meta">20 · Source 600</span></div>
  <div class="r"><span class="tok">lg</span><span class="s" style="font-size:16px;font-weight:500">Banritools</span><span class="meta">18 · Source 500</span></div>
  <div class="r"><span class="tok">base</span><span class="s" style="font-size:15px;font-weight:400">Banritools</span><span class="meta">16 · Source 400</span></div>
  <div class="r"><span class="tok">sm</span><span class="s" style="font-size:13px;font-weight:400;color:var(--text-muted)">Banritools</span><span class="meta">14 · Source 400</span></div>
  <div class="r"><span class="tok">xs</span><span class="s eyebrow" style="font-size:12px">Banritools</span><span class="meta">12 · uppercase</span></div>
</body>
</html>
